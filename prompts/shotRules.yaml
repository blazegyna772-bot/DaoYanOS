# 分镜生成规则模板
# 来源：soullensV5.1.html - 分镜生成核心逻辑
# 用途：定义五维叙事铁律和输出格式

# 五维叙事铁律（每镜必须遵守）
fiveDimensionRules:
  - id: "reject_abstract"
    name: "拒绝抽象"
    rule: "禁用'她很伤心'等抽象情绪词，必须视觉化（如'眼眶泛红，泪水打转'）"

  - id: "verb_driven"
    name: "动词驱动"
    rule: "【角色分动】字段必须含'正在'作为动作触发词"

  - id: "detail_zone"
    name: "细节禁区"
    rule: "【细节】字段严禁描述道具，只刻画微表情与情绪状态"

  - id: "dialogue_lock"
    name: "台词铁律"
    rule: "有对白必须写「台词(@人物N)："原文"」置于音效字段之前，原文逐字不改，无对白完全省略台词字段"

  - id: "asset_consistency"
    name: "资产一致"
    rule: "全篇 @人物N/@图片N/@道具N 标签严格统一，不得忽而标签忽而文字描述"


# 输出表格格式
tableFormat:
  # STC开启时的表头
  withSTC: "| 时间段 | 景别 | 运镜 | 画面描述 | 光影氛围 | 戏剧张力 | SEEDANCE提示词 |"
  # STC关闭时的表头
  withoutSTC: "| 时间段 | 景别 | 运镜 | 画面描述 | 光影氛围 | SEEDANCE提示词 |"


# SEEDANCE提示词列规范
seedanceFormat:
  template: "镜头：【景别+运镜】 环境：在@图片N [背景静态描述] 角色分动：@人物N [外观] 正在 [肢体动作]（多人用；分隔） 细节：@人物N [微表情与情绪状态] 光影：[光源方向+质感+色调] 台词(@人物N)：\"对白原文\"（无对白省略此字段） 音效：[环境音+声响]"

  rules:
    - "每个镜头写成一行，不换行"
    - "按固定顺序：镜头 → 环境 → 角色分动 → 细节 → 光影 → 台词 → 音效"
    - "严禁输出 --ar、--motion、--quality 等技术参数"
    - "严禁出现任何明星、名人姓名或版权角色名"


# 戏剧张力列格式（仅STC开启时）
tensionFormat:
  template: "[+/-][情绪：从X→Y] [冲突：障碍描述（10字内）]"
  example:
    positive: "[+ 情绪：从平静→期待] [冲突：门锁打不开]"
    negative: "[- 情绪：从希望→失望] [冲突：信件被风吹走]"
    atmosphereMode: "[情绪微变：从温暖→孤寂]"  # 氛围模式


# 画面描述列规则
visualDescriptionRules:
  - "用自然语言写人类可读的画面描述"
  - "严禁出现任何 @标签"
  - "描述必须具体、可拍摄"


# 光影氛围列规则
lightingRules:
  - "简短描述本镜整体光影色调"
  - "包含：光源方向、质感、色温"


# 输出禁止项
outputProhibitions:
  - "禁止任何前缀、后缀、markdown代码块"
  - "禁止输出说明文字"
  - "禁止输出技术参数（--ar, --motion, --quality等）"
  - "禁止明星姓名或版权角色名"


# 一致性要求
consistencyRules:
  - "人物服装、环境、光影在分镜间完全统一"
  - "动作逻辑无缝衔接"
  - "@标签全篇统一，不得中途切换为文字描述"